<header class="nav-toolbar">
  <a class="nav-title" routerLink="/">
    <span class="material-icons">local_hospital</span>
    CNA Study App
  </a>
  <span class="spacer"></span>

  <!-- Desktop links -->
  <nav class="nav-links desktop-nav">
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
      <span class="material-icons">home</span> Home
    </a>
    <a routerLink="/topics" routerLinkActive="active-link">
      <span class="material-icons">menu_book</span> Topics
    </a>
    <a routerLink="/days" routerLinkActive="active-link">
      <span class="material-icons">calendar_today</span> Study Days
    </a>
    <a routerLink="/glossary" routerLinkActive="active-link">
      <span class="material-icons">search</span> Glossary
    </a>
    <a routerLink="/flashcards" routerLinkActive="active-link">
      <span class="material-icons">style</span> Flashcards
    </a>
    <a routerLink="/quiz" routerLinkActive="active-link">
      <span class="material-icons">quiz</span> Quiz
    </a>
  </nav>

  <!-- Hamburger button (mobile only) -->
  <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Open navigation menu">
    <span class="material-icons">{{ menuOpen ? 'close' : 'menu' }}</span>
  </button>

  <!-- Mobile dropdown -->
  <div class="mobile-menu" [class.open]="menuOpen">
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
      <span class="material-icons">home</span> Home
    </a>
    <a routerLink="/topics" routerLinkActive="active-link" (click)="closeMenu()">
      <span class="material-icons">menu_book</span> Topics
    </a>
    <a routerLink="/days" routerLinkActive="active-link" (click)="closeMenu()">
      <span class="material-icons">calendar_today</span> Study Days
    </a>
    <a routerLink="/glossary" routerLinkActive="active-link" (click)="closeMenu()">
      <span class="material-icons">search</span> Glossary
    </a>
    <a routerLink="/flashcards" routerLinkActive="active-link" (click)="closeMenu()">
      <span class="material-icons">style</span> Flashcards
    </a>
    <a routerLink="/quiz" routerLinkActive="active-link" (click)="closeMenu()">
      <span class="material-icons">quiz</span> Quiz
    </a>
  </div>
</header>
